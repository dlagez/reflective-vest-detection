model:
  weights: weights/yolo11m_safety.pt
  device: auto  # auto = GPU first, fallback to CPU; 0 = cuda:0; cpu = CPU
  half: true  # FP16 inference

inference:
  conf: 0.5
  iou: 0.45
  max_det: 100
  agnostic_nms: false
  augment: false
  # YOLO input size — must be multiples of stride=32.
  # For 1080p portrait video (1080×1920), use 1088×1920.
  imgsz: [1088, 1920]
  yolo_verbose: false  # suppress per-frame YOLO logs

output:
  save_json: true
  save_viz: true
  output_dir: outputs
  viz_bbox: true
  viz_label: true
  viz_conf: true
