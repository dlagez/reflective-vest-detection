model:
  weights: weights/yolo11m_safety.pt
  device: 0  # 0 for GPU, -1 for CPU
  half: true  # FP16 inference

inference:
  conf: 0.5
  iou: 0.45
  max_det: 100
  agnostic_nms: false
  augment: false

output:
  save_json: true
  save_viz: true
  output_dir: outputs
  viz_bbox: true
  viz_label: true
  viz_conf: true
